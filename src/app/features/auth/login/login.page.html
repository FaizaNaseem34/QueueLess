<ion-content class="login-content" [fullscreen]="true">
  <div class="login-container">

    <div class="logo-section">
      <div class="icon-circle">
        <ion-icon name="flash"></ion-icon>
      </div>
      <h1>Queue<span>Less</span></h1>
      <p>Skip the line. Save your time.</p>
    </div>

    <div class="form-wrapper">
      <ion-segment [(ngModel)]="role" class="role-segment" style="margin-bottom: 20px;">
        <ion-segment-button value="user">
          <ion-label>User</ion-label>
        </ion-segment-button>
        <ion-segment-button value="admin">
          <ion-label>Admin</ion-label>
        </ion-segment-button>
      </ion-segment>

      <form [formGroup]="loginForm" (ngSubmit)="login()">
        <ion-item lines="none" class="custom-input" [class.ion-invalid]="isSubmitted && f['email'].errors">
          <ion-icon name="mail-outline" slot="start"></ion-icon>
          <ion-input
            label="Email"
            label-placement="floating"
            type="email"
            placeholder="name@example.com"
            formControlName="email">
          </ion-input>
        </ion-item>
        <div class="error-message" *ngIf="isSubmitted && f['email'].errors?.['required']">Email is required</div>
        <div class="error-message" *ngIf="isSubmitted && f['email'].errors?.['email']">Please enter a valid email</div>

        <ion-item lines="none" class="custom-input" [class.ion-invalid]="isSubmitted && f['password'].errors">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input
            label="Password"
            label-placement="floating"
            type="password"
            placeholder="••••••••"
            formControlName="password">
          </ion-input>
        </ion-item>
        <div class="error-message" *ngIf="isSubmitted && f['password'].errors?.['required']">Password is required</div>
        <div class="error-message" *ngIf="isSubmitted && f['password'].errors?.['minlength']">Password must be at least 6 characters</div>

        <ion-button expand="block" class="login-btn" type="submit">
          Log In
        </ion-button>
      </form>

      <div class="footer-links">
        <p class="link-text" routerLink="/auth/forgot-password">Forgot Password?</p>
        <p class="link-text" routerLink="/auth/signup">Create Account</p>
      </div>
    </div>

  </div>
</ion-content>
